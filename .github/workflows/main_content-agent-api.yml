# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - content-agent-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B47E75A7DA41431F974B9217E33C1C57 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_453BE39A17EC47F288D41432A9D467A7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A00FE2D73DF8441AA87339022A1BC18B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'content-agent-api'
          slot-name: 'Production'
          package: .

      # Recycle the worker so new wwwroot/static files (e.g. videos) are served; same effect as touching web.config.
      - name: Restart Azure Web App
        run: |
          $rg = az webapp list --query "[?name=='content-agent-api'] | [0].resourceGroup" -o tsv
          if ([string]::IsNullOrWhiteSpace($rg)) { throw "Could not resolve resource group for web app content-agent-api" }
          az webapp restart --name content-agent-api --resource-group $rg
