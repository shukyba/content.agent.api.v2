<?xml version="1.0" encoding="UTF-8"?>
<!-- Answer overlay 1080x1920. Merge: answer-text, footer-day. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style type="text/css"><![CDATA[
      .quiz-text { fill: #ffffff; font-family: 'Titan One', sans-serif; font-weight: 400; }
    ]]></style>
  </defs>

  <rect id="dim-full" x="0" y="0" width="1080" height="1920" fill="#000000" opacity="0.4"/>

  <g id="answer-ui" display="inline">
    <text id="answer-heading" class="quiz-text" x="540" y="620" text-anchor="middle" font-size="44" opacity="0.9">Answer</text>
    <rect id="answer-card-bg" x="90" y="680" width="900" height="520" fill="#000000" opacity="0.65" rx="24"/>
    <text id="answer-text" class="quiz-text" x="540" y="960" text-anchor="middle" font-size="48">Correct answer text</text>
  </g>

  <text id="footer-day" class="quiz-text" x="540" y="1780" text-anchor="middle" font-size="52" opacity="0.85">Day 1</text>
</svg>
